<!DOCTYPE html>
<html lang="en"
      data-default-theme="minimal"
      data-theme-lock="minimal"
      data-default-mode="light"
      data-default-brand="#0ea5e9">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epoch/Human Date Converter</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/crusher-ui.min.css" integrity="sha384-EIv1tRpD4TjJA0H6sAVfeiJJyJt6DwPxbTYWSsJzylRFMkqMI6xVARApOqqWm5iI" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/themes/minimal.css" integrity="sha384-QYfQeMTJKWZuoEgfBv8ZvJwG12qr6YW8SF6ziK3aHL9luxKjnoswdj/yek7EwpJN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/static/tool-shell.css" integrity="sha384-+mIUnYgeB+0Qf10OjT3tSbT2al2Y8erQfw/uws4os7AxVKNLYeEUW5zHUehGBTVq" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/static/tool-shell.js" integrity="sha384-gNDnPKn5AoF0e4Q555fGbM+snO+UCP3/z4ErG3cyS/Akusg/bzTO+AYmG1WAMnab" crossorigin="anonymous"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tool-mono { font-family: 'JetBrains Mono', monospace; }

        .tool-grid {
            display: grid;
            gap: var(--crusher-spacing-6);
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 18rem), 1fr));
            max-width: 56rem;
            margin-inline: auto;
        }
        .tool-section { padding: var(--crusher-spacing-6); display: grid; gap: var(--crusher-spacing-4); }
        .tool-section h3 {
            margin: 0 0 var(--crusher-spacing-2);
            padding-bottom: var(--crusher-spacing-3);
            border-bottom: 1px solid var(--crusher-border-primary);
            font-size: var(--crusher-font-size-xl);
            color: var(--crusher-text-primary);
        }
        .tool-label {
            display: block;
            margin-bottom: var(--crusher-spacing-1);
            font-size: var(--crusher-font-size-sm);
            color: var(--crusher-text-secondary);
        }
        input.crusher-tool-control,
        select.crusher-tool-control {
            padding: var(--crusher-spacing-2);
        }
    </style>
</head>
<body class="crusher-tool-page">

    <main class="crusher-tool-shell">
        <header class="crusher-tool-header">
            <h1 class="crusher-tool-title">Epoch/Human Date Converter</h1>
            <p class="crusher-tool-lede">Convert timestamps with timezone support.</p>
        </header>

        <div class="tool-grid">
            <section class="crusher-tool-surface tool-section">
                <h3>Human to Epoch</h3>
                <div>
                    <label for="date-input" class="tool-label">Date &amp; Time</label>
                    <input type="datetime-local" id="date-input" class="crusher-tool-control">
                </div>
                <div>
                    <label for="timezone-select" class="tool-label">Timezone</label>
                    <select id="timezone-select" class="crusher-tool-control">
                        <option value="local">Local</option>
                        <option value="UTC">UTC</option>
                    </select>
                </div>
                <div>
                    <label for="unix-output" class="tool-label">Result (Seconds)</label>
                    <input type="text" id="unix-output" readonly class="crusher-tool-control tool-mono">
                </div>
            </section>

            <section class="crusher-tool-surface tool-section">
                <h3>Epoch to Human</h3>
                <div>
                    <label for="epoch-input" class="tool-label">Timestamp</label>
                    <input type="number" id="epoch-input" class="crusher-tool-control tool-mono">
                </div>
                <div>
                    <label for="timezone-select-2" class="tool-label">Timezone</label>
                    <select id="timezone-select-2" class="crusher-tool-control">
                        <option value="local">Local</option>
                        <option value="UTC">UTC</option>
                    </select>
                </div>
                <div>
                    <label for="date-output" class="tool-label">Result Date</label>
                    <input type="text" id="date-output" readonly class="crusher-tool-control">
                </div>
            </section>
        </div>
    </main>

    <a href="https://tools.muhammadhassaanjaved.com/" id="hub-bubble" class="crusher-tool-fab" title="View All Tools" target="_blank" rel="noopener noreferrer">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
    </a>

    <crusher-style-switcher
      default-theme="minimal"
      default-brand="#0ea5e9"
      hide-themes
      hide-theme-color>
        <svg slot="mode-light-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        <svg slot="mode-dark-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
    </crusher-style-switcher>
    <script type="module" src="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/crusher-ui.standalone.esm.js" integrity="sha384-RkuNGzCebUwZ5RZDFSKGQ7sDaUpdPfDxO088yXDMPM5CvJ4eBy2Jf/UhLwGay/4K" crossorigin="anonymous"></script>

    <script>
        const dateInput = document.getElementById('date-input');
        const unixOutput = document.getElementById('unix-output');
        const epochInput = document.getElementById('epoch-input');
        const dateOutput = document.getElementById('date-output');

        dateInput.addEventListener('input', () => {
            if (!dateInput.value) return;
            const d = new Date(dateInput.value);
            const ts = Math.floor(d.getTime() / 1000);
            unixOutput.value = ts;
        });

        epochInput.addEventListener('input', () => {
            if (!epochInput.value) return;
            const ts = Number(epochInput.value);
            const d = new Date(ts * 1000);
            dateOutput.value = d.toString();
        });
    </script>
</body>
</html>
